<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cat</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f0eb;
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #2c2c2c;
    }

    .page-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      padding: 3rem 2rem;
    }

    .title-block {
      text-align: center;
      letter-spacing: 0.25em;
    }

    .title-block h1 {
      font-size: 0.75rem;
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 0.4em;
      color: #888;
    }

    .title-block h2 {
      font-size: 2rem;
      font-weight: 300;
      font-style: italic;
      color: #2c2c2c;
      margin-top: 0.4rem;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: #c8b89a;
      margin: 0 auto;
    }

    svg .cat-body {
      animation: float 4s ease-in-out infinite;
    }
    svg .tail {
      animation: tail-sway 3s ease-in-out infinite;
      transform-origin: 300px 340px;
    }
    svg .eye-l { animation: blink 5s ease-in-out infinite; transform-origin: 248px 198px; }
    svg .eye-r { animation: blink 5s ease-in-out infinite; transform-origin: 322px 198px; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }
    @keyframes tail-sway {
      0%, 100% { transform: rotate(-12deg); }
      50%       { transform: rotate(12deg); }
    }
    @keyframes blink {
      0%, 92%, 100% { transform: scaleY(1); }
      96%           { transform: scaleY(0.05); }
    }

    .caption {
      text-align: center;
      font-style: italic;
      font-size: 0.95rem;
      font-weight: 300;
      color: #888;
      letter-spacing: 0.1em;
    }

    .footer-line {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.35em;
      color: #bbb;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="page-wrapper">

    <div class="title-block">
      <h1>A Study in</h1>
      <h2>Feline Grace</h2>
    </div>

    <div class="divider"></div>

    <svg width="420" height="420" viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg" overflow="visible">
      <defs>
        <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#c8b89a" flood-opacity="0.35"/>
        </filter>
      </defs>

      <!-- Shadow on ground -->
      <ellipse cx="210" cy="400" rx="90" ry="10" fill="#d6ccbf" opacity="0.5"/>

      <g class="cat-body" filter="url(#soft-shadow)">

        <!-- TAIL -->
        <g class="tail">
          <path d="M310,340 Q380,290 385,220 Q388,175 358,168"
                fill="none" stroke="#c8a882" stroke-width="14" stroke-linecap="round"/>
          <path d="M310,340 Q380,290 385,220 Q388,175 358,168"
                fill="none" stroke="#e0c9a8" stroke-width="7" stroke-linecap="round" opacity="0.6"/>
          <ellipse cx="356" cy="163" rx="13" ry="10" fill="#c8a882"/>
        </g>

        <!-- BODY -->
        <ellipse cx="210" cy="320" rx="110" ry="88" fill="#d4a96a" />
        <!-- body shading -->
        <ellipse cx="210" cy="320" rx="110" ry="88" fill="url(#bodyGrad)" opacity="0.3"/>

        <!-- belly -->
        <ellipse cx="210" cy="338" rx="52" ry="48" fill="#f0dfc0"/>

        <!-- PAWS -->
        <ellipse cx="168" cy="398" rx="30" ry="13" fill="#c8a882"/>
        <ellipse cx="252" cy="398" rx="30" ry="13" fill="#c8a882"/>
        <!-- paw toe lines -->
        <line x1="156" y1="398" x2="156" y2="406" stroke="#b8936a" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
        <line x1="168" y1="400" x2="168" y2="408" stroke="#b8936a" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
        <line x1="180" y1="398" x2="180" y2="406" stroke="#b8936a" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
        <line x1="240" y1="398" x2="240" y2="406" stroke="#b8936a" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
        <line x1="252" y1="400" x2="252" y2="408" stroke="#b8936a" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
        <line x1="264" y1="398" x2="264" y2="406" stroke="#b8936a" stroke-width="1" stroke-linecap="round" opacity="0.7"/>

        <!-- NECK -->
        <rect x="182" y="248" width="56" height="48" rx="12" fill="#d4a96a"/>

        <!-- HEAD -->
        <ellipse cx="210" cy="210" rx="88" ry="78" fill="#d4a96a"/>

        <!-- EAR LEFT -->
        <polygon points="145,158 128,88 196,140" fill="#c8a882"/>
        <polygon points="150,155 140,104 190,142" fill="#e8c4b0" opacity="0.7"/>
        <!-- EAR RIGHT -->
        <polygon points="275,158 292,88 224,140" fill="#c8a882"/>
        <polygon points="270,155 280,104 230,142" fill="#e8c4b0" opacity="0.7"/>

        <!-- Subtle head stripes -->
        <path d="M178,145 Q186,162 180,182" fill="none" stroke="#bf9055" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
        <path d="M210,138 Q210,158 210,182" fill="none" stroke="#bf9055" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
        <path d="M242,145 Q234,162 240,182" fill="none" stroke="#bf9055" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

        <!-- EYES -->
        <g class="eye-l">
          <ellipse cx="248" cy="198" rx="20" ry="20" fill="#fff" opacity="0.95"/>
          <ellipse cx="248" cy="200" rx="10" ry="14" fill="#4a7c59"/>
          <ellipse cx="248" cy="200" rx="5" ry="9" fill="#1a1a1a"/>
          <circle cx="252" cy="196" r="3.5" fill="white"/>
        </g>
        <g class="eye-r">
          <ellipse cx="322" cy="198" rx="20" ry="20" fill="#fff" opacity="0.95"/>
          <ellipse cx="322" cy="200" rx="10" ry="14" fill="#4a7c59"/>
          <ellipse cx="322" cy="200" rx="5" ry="9" fill="#1a1a1a"/>
          <circle cx="326" cy="196" r="3.5" fill="white"/>
        </g>

        <!-- NOSE -->
        <polygon points="210,224 203,232 217,232" fill="#d4849a"/>
        <!-- philtrum -->
        <line x1="210" y1="232" x2="210" y2="238" stroke="#b87090" stroke-width="1" stroke-linecap="round"/>

        <!-- MOUTH -->
        <path d="M203,238 Q197,245 190,241" fill="none" stroke="#a06070" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M217,238 Q223,245 230,241" fill="none" stroke="#a06070" stroke-width="1.5" stroke-linecap="round"/>

        <!-- WHISKERS -->
        <line x1="115" y1="224" x2="195" y2="228" stroke="#8a7060" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
        <line x1="112" y1="234" x2="195" y2="234" stroke="#8a7060" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
        <line x1="116" y1="244" x2="195" y2="240" stroke="#8a7060" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
        <line x1="305" y1="228" x2="385" y2="224" stroke="#8a7060" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
        <line x1="305" y1="234" x2="388" y2="234" stroke="#8a7060" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
        <line x1="305" y1="240" x2="384" y2="244" stroke="#8a7060" stroke-width="1" stroke-linecap="round" opacity="0.6"/>

        <!-- COLLAR — thin ribbon -->
        <rect x="174" y="262" width="72" height="12" rx="6" fill="#2c2c2c" opacity="0.85"/>
        <!-- tiny collar gem -->
        <circle cx="210" cy="268" r="4" fill="#c8a882" stroke="#fff" stroke-width="0.5" opacity="0.9"/>

      </g>
    </svg>

    <p class="caption">purrfect</p>

    <div class="divider"></div>

    <p class="footer-line">est. mmxxv &nbsp;·&nbsp; always under construction</p>

  </div>
</body>
</html>
