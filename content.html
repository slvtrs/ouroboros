<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');
    body {
      background: #120810;
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow-x: hidden;
      color: #d4b0c4;
    }
    .cat-body { animation: bounce 0.6s infinite alternate ease-in-out; }
    .tail { animation: wag 0.4s infinite alternate ease-in-out; transform-origin: 420px 310px; }
    .eye-l, .eye-r { animation: blink 3s infinite; }
    .sparkle1 { animation: spin 1.2s linear infinite; transform-origin: 80px 80px; }
    .sparkle2 { animation: spin 0.8s linear infinite reverse; transform-origin: 460px 60px; }
    .sparkle3 { animation: spin 1.5s linear infinite; transform-origin: 70px 380px; }
    .sparkle4 { animation: spin 1s linear infinite reverse; transform-origin: 460px 370px; }
    .banner { animation: wiggle 0.5s infinite alternate; transform-origin: center; }
    .paw-l { animation: paw 0.5s infinite alternate; transform-origin: 240px 380px; }
    .paw-r { animation: paw 0.5s infinite alternate reverse; transform-origin: 340px 380px; }

    .orbit-group {
      animation: orbit 3s linear infinite;
      transform-origin: 290px 280px;
    }
    .orbit-group-reverse {
      animation: orbit-reverse 4s linear infinite;
      transform-origin: 290px 280px;
    }
    .orbit-group-slow {
      animation: orbit 5.5s linear infinite;
      transform-origin: 290px 280px;
    }

    @keyframes orbit {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes orbit-reverse {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }
    .mouse-upright {
      animation: counter-orbit 3s linear infinite;
      transform-origin: 290px 280px;
    }
    .mouse-upright-reverse {
      animation: counter-orbit-reverse 4s linear infinite;
      transform-origin: 290px 280px;
    }
    .mouse-upright-slow {
      animation: counter-orbit-slow 5.5s linear infinite;
      transform-origin: 290px 280px;
    }
    @keyframes counter-orbit {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }
    @keyframes counter-orbit-reverse {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes counter-orbit-slow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }

    @keyframes bounce {
      from { transform: translateY(0px); }
      to   { transform: translateY(-18px); }
    }
    @keyframes wag {
      from { transform: rotate(-30deg); }
      to   { transform: rotate(30deg); }
    }
    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.05); }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes wiggle {
      from { transform: rotate(-4deg) scale(1.02); }
      to   { transform: rotate(4deg) scale(0.98); }
    }
    @keyframes paw {
      from { transform: rotate(-15deg); }
      to   { transform: rotate(15deg); }
    }
    .rainbow-text {
      font-size: 1.3rem;
      font-weight: 300;
      letter-spacing: 4px;
      font-style: italic;
      font-family: 'Cormorant Garamond', Georgia, serif;
    }

    .sticker {
      position: fixed;
      top: -120px;
      font-size: 1rem;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-style: italic;
      white-space: nowrap;
      pointer-events: none;
      z-index: 999;
      animation: fall linear infinite;
      user-select: none;
    }
    @keyframes fall {
      0%   { transform: translateY(0px) rotate(0deg); opacity: 0.9; }
      90%  { opacity: 0.9; }
      100% { transform: translateY(110vh) rotate(15deg); opacity: 0; }
    }
  </style>

  <button id="music-btn" onclick="toggleMusic()">♪ play music</button>
  <script>
    (function() {
      // Raw Web Audio API — no external library, works on iOS
      const AC = window.AudioContext || window.webkitAudioContext;
      let ctx = null, masterGain = null;
      let playing = false, stepTimer = null;

      // Fm – Db – Ab – Eb (synthwave classic), freqs in Hz
      const chords = [
        [174.61, 207.65, 261.63, 311.13], // Fm
        [138.59, 174.61, 207.65, 261.63], // Db
        [103.83, 155.56, 207.65, 261.63], // Ab
        [155.56, 196.00, 233.08, 277.18], // Eb
      ];
      const bassFreqs = [87.31, 69.30, 51.91, 77.78]; // F1 Db1 Ab1 Eb1
      const melFreqs  = [
        [698.46, 523.25, 415.30, 622.25],
        [554.37, 415.30, 349.23, 415.30],
        [415.30, 523.25, 622.25, 523.25],
        [622.25, 466.16, 392.00, 466.16],
      ];

      let chordIdx = 0, melBar = 0, melNote = 0;
      let padOscs = [];

      function note(freq, type, startT, dur, peakGain, attack, release) {
        const osc = ctx.createOscillator();
        const env = ctx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        env.gain.setValueAtTime(0, startT);
        env.gain.linearRampToValueAtTime(peakGain, startT + attack);
        osc.connect(env);
        env.connect(masterGain);
        osc.start(startT); // must call start before stop
        if (dur > 0) {
          env.gain.setValueAtTime(peakGain, startT + dur - release);
          env.gain.linearRampToValueAtTime(0, startT + dur);
          osc.stop(startT + dur + 0.05);
        }
        return { osc, env };
      }

      function releaseOscs(oscs) {
        const now = ctx.currentTime;
        oscs.forEach(({ osc, env }) => {
          try {
            env.gain.cancelScheduledValues(now);
            env.gain.setValueAtTime(env.gain.value, now);
            env.gain.linearRampToValueAtTime(0, now + 1.5);
            osc.stop(now + 1.6);
          } catch(e) {}
        });
      }

      function step() {
        const now = ctx.currentTime + 0.05; // small buffer for iOS scheduling
        const beat = 60 / 80; // 80 BPM
        const bar  = beat * 4;

        // Pad chord — new chord every 2 bars
        releaseOscs(padOscs);
        padOscs = chords[chordIdx % 4].map(f => note(f, 'sawtooth', now, 0, 0.10, 1.0, 1.5));
        // bass
        note(bassFreqs[chordIdx % 4], 'triangle', now,       bar, 0.22, 0.04, 0.3);
        note(bassFreqs[chordIdx % 4], 'triangle', now + bar, bar, 0.18, 0.04, 0.3);
        // melody — 8 eighth notes over 2 bars
        for (let i = 0; i < 8; i++) {
          const mf = melFreqs[melBar % 4][(melNote + i) % 4];
          note(mf, 'triangle', now + i * beat * 0.5, beat * 0.45, 0.06, 0.05, 0.1);
        }
        melNote = (melNote + 8) % 4;
        if (melNote === 0) melBar++;
        chordIdx++;
      }

      window._startMusic = function(existingCtx) {
        if (playing) return;
        ctx = existingCtx || ctx || new AC();
        masterGain = ctx.createGain();
        masterGain.gain.value = 1;
        masterGain.connect(ctx.destination);
        playing = true;
        step();
        stepTimer = setInterval(step, (60 / 80) * 4 * 2 * 1000); // every 2 bars
      };

      window._stopMusic = function() {
        playing = false;
        clearInterval(stepTimer);
        releaseOscs(padOscs);
        padOscs = [];
        chordIdx = 0; melBar = 0; melNote = 0;
      };
    })();

    function toggleMusic() {
      const btn = document.getElementById('music-btn');
      if (btn.dataset.playing === 'true') {
        window._stopMusic && window._stopMusic();
        btn.textContent = '♪ play music';
        btn.dataset.playing = 'false';
        return;
      }
      btn.dataset.playing = 'true';
      btn.textContent = '♫ pause music';

      // iOS silent mode workaround: playing HTML5 audio inside a user gesture switches the
      // AVAudioSession category to "playback", letting Web Audio bypass the ringer switch.
      // Build a valid 1-sample silent WAV via Blob so iOS treats it as real audio content.
      var wav = new Uint8Array([
        82,73,70,70, 38,0,0,0, 87,65,86,69,        // RIFF....WAVE
        102,109,116,32, 16,0,0,0, 1,0, 1,0,         // fmt  PCM mono
        68,172,0,0, 136,88,1,0, 2,0, 16,0,           // 44100Hz 88200bps 2ba 16bit
        100,97,116,97, 2,0,0,0, 0,0                  // data + 1 silent sample
      ]);
      var blobUrl = URL.createObjectURL(new Blob([wav], {type:'audio/wav'}));
      var ua = new Audio(blobUrl);
      ua.play().catch(function(){});
      ua.onended = function(){ URL.revokeObjectURL(blobUrl); };

      var AC = window.AudioContext || window.webkitAudioContext;
      var ctx = new AC();
      ctx.resume().then(function() {
        if (typeof window._startMusic === 'function') window._startMusic(ctx);
      });
    }
  </script>

  <script>
    // Slow colour drift on the tagline
    const colors = ['#c4547a','#9b4a7c','#d4849a','#e8a0b8','#c4547a'];
    const el = document.getElementById('rainbow');
    let offset = 0;
    setInterval(() => {
      const text = el.textContent;
      el.innerHTML = [...text].map((ch, i) =>
        ch === ' ' ? ' ' : `<span style="color:${colors[(i + offset) % colors.length]}">${ch}</span>`
      ).join('');
      offset++;
    }, 200);

    // Sparse falling whispers
    const stickers = [
      { text: 'stay', color: '#c4547a' },
      { text: '♥', color: '#d4849a' },
      { text: 'closer', color: '#9b4a7c' },
      { text: 'meow', color: '#c4547a' },
      { text: '✦', color: '#d4849a' },
      { text: 'don\'t go', color: '#9b4a7c' },
      { text: '♡', color: '#c4547a' },
      { text: 'gorgeous', color: '#d4849a' },
      { text: '~', color: '#9b4a7c' },
      { text: 'darling', color: '#c4547a' },
    ];

    const container = document.getElementById('stickers-container');

    function createSticker() {
      const s = stickers[Math.floor(Math.random() * stickers.length)];
      const div = document.createElement('div');
      div.className = 'sticker';
      div.textContent = s.text;
      const left = Math.random() * 95;
      const duration = 6 + Math.random() * 8;
      const delay = Math.random() * 2;
      div.style.left = left + 'vw';
      div.style.animationDuration = duration + 's';
      div.style.animationDelay = delay + 's';
      div.style.color = s.color;
      div.style.fontSize = (0.8 + Math.random() * 0.8) + 'rem';
      div.style.opacity = 0.6 + Math.random() * 0.4;
      container.appendChild(div);
      setTimeout(() => div.remove(), (duration + delay) * 1000 + 500);
    }

    setInterval(createSticker, 2500);
    for (let i = 0; i < 4; i++) setTimeout(createSticker, i * 600);
  </script>

</body>
