<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');
    body {
      background: #120810;
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow-x: hidden;
      color: #d4b0c4;
    }
    .cat-body { animation: bounce 0.6s infinite alternate ease-in-out; }
    .tail { animation: wag 0.4s infinite alternate ease-in-out; transform-origin: 420px 310px; }
    .eye-l, .eye-r { animation: blink 3s infinite; }
    .sparkle1 { animation: spin 1.2s linear infinite; transform-origin: 80px 80px; }
    .sparkle2 { animation: spin 0.8s linear infinite reverse; transform-origin: 460px 60px; }
    .sparkle3 { animation: spin 1.5s linear infinite; transform-origin: 70px 380px; }
    .sparkle4 { animation: spin 1s linear infinite reverse; transform-origin: 460px 370px; }
    .banner { animation: wiggle 0.5s infinite alternate; transform-origin: center; }
    .paw-l { animation: paw 0.5s infinite alternate; transform-origin: 240px 380px; }
    .paw-r { animation: paw 0.5s infinite alternate reverse; transform-origin: 340px 380px; }

    .orbit-group {
      animation: orbit 3s linear infinite;
      transform-origin: 290px 280px;
    }
    .orbit-group-reverse {
      animation: orbit-reverse 4s linear infinite;
      transform-origin: 290px 280px;
    }
    .orbit-group-slow {
      animation: orbit 5.5s linear infinite;
      transform-origin: 290px 280px;
    }

    @keyframes orbit {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes orbit-reverse {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }
    .mouse-upright {
      animation: counter-orbit 3s linear infinite;
      transform-origin: 290px 280px;
    }
    .mouse-upright-reverse {
      animation: counter-orbit-reverse 4s linear infinite;
      transform-origin: 290px 280px;
    }
    .mouse-upright-slow {
      animation: counter-orbit-slow 5.5s linear infinite;
      transform-origin: 290px 280px;
    }
    @keyframes counter-orbit {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }
    @keyframes counter-orbit-reverse {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes counter-orbit-slow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }

    @keyframes bounce {
      from { transform: translateY(0px); }
      to   { transform: translateY(-18px); }
    }
    @keyframes wag {
      from { transform: rotate(-30deg); }
      to   { transform: rotate(30deg); }
    }
    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.05); }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes wiggle {
      from { transform: rotate(-4deg) scale(1.02); }
      to   { transform: rotate(4deg) scale(0.98); }
    }
    @keyframes paw {
      from { transform: rotate(-15deg); }
      to   { transform: rotate(15deg); }
    }
    .rainbow-text {
      font-size: 1.3rem;
      font-weight: 300;
      letter-spacing: 4px;
      font-style: italic;
      font-family: 'Cormorant Garamond', Georgia, serif;
    }

    .sticker {
      position: fixed;
      top: -120px;
      font-size: 1rem;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-style: italic;
      white-space: nowrap;
      pointer-events: none;
      z-index: 999;
      animation: fall linear infinite;
      user-select: none;
    }
    @keyframes fall {
      0%   { transform: translateY(0px) rotate(0deg); opacity: 0.9; }
      90%  { opacity: 0.9; }
      100% { transform: translateY(110vh) rotate(15deg); opacity: 0; }
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center">

  <div id="stickers-container"></div>

  <!-- Marquee banner -->
  <div class="w-full mb-4 overflow-hidden" style="background: #1e0d1a; border-bottom: 1px solid #3a1a30;">

      &nbsp;&nbsp;come closer &nbsp;·&nbsp; don't be shy &nbsp;·&nbsp; stay a while &nbsp;·&nbsp; you look good tonight &nbsp;·&nbsp; meow &nbsp;·&nbsp; is it warm in here &nbsp;·&nbsp; come closer &nbsp;·&nbsp; don't be shy &nbsp;·&nbsp; stay a while &nbsp;&nbsp;
    </marquee>
  </div>

  <svg width="540" height="460" viewBox="0 0 540 460" xmlns="http://www.w3.org/2000/svg" overflow="visible">

    <!-- Sparkle 1 -->
    <g class="sparkle1">
      <polygon points="80,68 83,78 93,80 83,82 80,92 77,82 67,80 77,78" fill="#c4547a" stroke="#8b2a50" stroke-width="1"/>
    </g>
    <!-- Sparkle 2 -->
    <g class="sparkle2">

    </g>
    <!-- Sparkle 3 -->
    <g class="sparkle3">
      <polygon points="70,368 73,378 83,380 73,382 70,392 67,382 57,380 67,378" fill="#c4547a" stroke="#8b2a50" stroke-width="1"/>
    </g>
    <!-- Sparkle 4 -->
    <g class="sparkle4">
      <polygon points="460,358 463,368 473,370 463,372 460,382 457,372 447,370 457,368" fill="#9b4a7c" stroke="#6b2a5a" stroke-width="1"/>

          <circle cx="-13" cy="-5" r="2" fill="#111"/>

          <ellipse cx="11" cy="-4" rx="9" ry="8" fill="#d4a96a" stroke="#8B6914" stroke-width="1"/>
          <ellipse cx="17" cy="-10" rx="4.5" ry="4.5" fill="#d4a96a" stroke="#8B6914" stroke-width="1"/>
          <ellipse cx="17" cy="-10" rx="2.8" ry="2.8" fill="#c4547a"/>
          <ellipse cx="8" cy="-11" rx="4.5" ry="4.5" fill="#d4a96a" stroke="#8B6914" stroke-width="1"/>
          <ellipse cx="8" cy="-11" rx="2.8" ry="2.8" fill="#c4547a"/>
          <circle cx="13" cy="-5" r="2.2" fill="#111"/>
          <circle cx="14" cy="-6" r="0.8" fill="white"/>
          <ellipse cx="19" cy="-2" rx="1.8" ry="1.2" fill="#c4547a"/>
          <line x1="19" y1="-2" x2="26" y2="-4" stroke="#8B6914" stroke-width="0.8"/>
          <line x1="19" y1="-2" x2="26" y2="-1" stroke="#8B6914" stroke-width="0.8"/>
          <line x1="19" y1="-2" x2="26" y2="2" stroke="#8B6914" stroke-width="0.8"/>
        </g>
      </g>
    </g>

    <g class="orbit-group-slow">
      <g transform="translate(184, 386)">
        <g class="mouse-upright-slow">

          <ellipse cx="0" cy="0" rx="11" ry="8" fill="#9b8fc7" stroke="#5a4d8a" stroke-width="1"/>
          <ellipse cx="-9" cy="-3" rx="7.5" ry="6.5" fill="#9b8fc7" stroke="#5a4d8a" stroke-width="1"/>
          <ellipse cx="-14" cy="-8" rx="4" ry="4" fill="#9b8fc7" stroke="#5a4d8a" stroke-width="1"/>
          <ellipse cx="-14" cy="-8" rx="2.5" ry="2.5" fill="#c4547a"/>
          <ellipse cx="-7" cy="-9" rx="4" ry="4" fill="#9b8fc7" stroke="#5a4d8a" stroke-width="1"/>
          <ellipse cx="-7" cy="-9" rx="2.5" ry="2.5" fill="#c4547a"/>
          <circle cx="-12" cy="-4" r="2" fill="#111"/>
          <circle cx="-11" cy="-5" r="0.7" fill="white"/>
          <ellipse cx="-16" cy="-1" rx="1.5" ry="1" fill="#c4547a"/>
          <line x1="-16" y1="-1" x2="-22" y2="-3" stroke="#5a4d8a" stroke-width="0.8"/>
          <line x1="-16" y1="-1" x2="-22" y2="0" stroke="#5a4d8a" stroke-width="0.8"/>
          <line x1="-16" y1="-1" x2="-22" y2="2" stroke="#5a4d8a" stroke-width="0.8"/>
        </g>
      </g>
    </g>

    <!-- CAT GROUP (bounces) -->
    <g class="cat-body">

      <!-- TOASTER BODY -->
      <rect x="170" y="240" width="240" height="170" rx="18" fill="#c8c8c8" stroke="#888" stroke-width="3"/>
      <!-- Toaster body shine -->
      <rect x="178" y="248" width="60" height="154" rx="10" fill="#e0e0e0" opacity="0.4"/>
      <!-- Toaster slot left -->
      <rect x="215" y="255" width="42" height="80" rx="8" fill="#444" stroke="#333" stroke-width="2"/>
      <!-- Toaster slot right -->
      <rect x="323" y="255" width="42" height="80" rx="8" fill="#444" stroke="#333" stroke-width="2"/>
      <!-- Lever left -->
      <rect x="228" y="330" width="16" height="36" rx="6" fill="#b0522a" stroke="#7a3010" stroke-width="1.5"/>
      <!-- Lever right -->
      <rect x="336" y="330" width="16" height="36" rx="6" fill="#b0522a" stroke="#7a3010" stroke-width="1.5"/>
      <!-- Feet -->
      <rect x="188" y="404" width="38" height="14" rx="5" fill="#aaa" stroke="#888" stroke-width="1.5"/>
      <rect x="354" y="404" width="38" height="14" rx="5" fill="#aaa" stroke="#888" stroke-width="1.5"/>
      <!-- Dial knob -->
      <circle cx="290" cy="370" r="18" fill="#b0522a" stroke="#7a3010" stroke-width="2"/>
      <line x1="290" y1="356" x2="290" y2="365" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Brand label -->
      <rect x="248" y="390" width="84" height="20" rx="5" fill="#c4547a" stroke="#8b2a50" stroke-width="1.5"/>
      <text x="290" y="404" text-anchor="middle" font-family="'Cormorant Garamond',Georgia,serif" font-size="11" font-style="italic" fill="white">Meow-ster</text>

      <!-- TOAST popping out left slot -->
      <rect x="220" y="200" width="32" height="62" rx="4" fill="#e8c87a" stroke="#b8860b" stroke-width="2"/>
      <rect x="224" y="204" width="24" height="42" rx="2" fill="#d4a040" opacity="0.7"/>
      <!-- Toast crust top -->
      <ellipse cx="236" cy="201" rx="16" ry="5" fill="#c8860a" stroke="#b8860b" stroke-width="1"/>

      <!-- TOAST popping out right slot -->
      <rect x="328" y="195" width="32" height="68" rx="4" fill="#e8c87a" stroke="#b8860b" stroke-width="2"/>
      <rect x="332" y="199" width="24" height="48" rx="2" fill="#d4a040" opacity="0.7"/>
      <!-- Toast crust top -->
      <ellipse cx="344" cy="196" rx="16" ry="5" fill="#c8860a" stroke="#b8860b" stroke-width="1"/>

      <!-- FACE on toaster front -->
      <!-- Eyes -->
      <g class="eye-l" style="transform-origin:248px 310px;">
        <ellipse cx="248" cy="310" rx="18" ry="18" fill="white" stroke="#888" stroke-width="2"/>
        <ellipse cx="248" cy="312" rx="9" ry="12" fill="#c4547a"/>

      <g class="eye-r" style="transform-origin:332px 310px;">
        <ellipse cx="332" cy="310" rx="18" ry="18" fill="white" stroke="#888" stroke-width="2"/>

      <polygon points="290,330 283,339 297,339" fill="#FF69B4" stroke="#FF1493" stroke-width="1"/>

      <!-- Whiskers left -->

      <line x1="395" y1="325" x2="308" y2="331" stroke="#888" stroke-width="1.5"/>
      <line x1="397" y1="336" x2="308" y2="337" stroke="#888" stroke-width="1.5"/>

      <!-- Toaster cord -->
      <path d="M290,410 Q290,440 320,445 Q360,450 370,430" fill="none" stroke="#555" stroke-width="4" stroke-linecap="round"/>
      <!-- Plug -->
      <rect x="366" y="424" width="20" height="14" rx="3" fill="#333" stroke="#111" stroke-width="1.5"/>
      <line x1="371" y1="418" x2="371" y2="424" stroke="#333" stroke-width="2.5"/>

    </g>

    <!-- Speech bubble -->
    <g>
      <rect x="370" y="80" width="150" height="65" rx="16" fill="#1e0d1a" stroke="#c4547a" stroke-width="2"/>
      <polygon points="400,144 385,165 420,144" fill="#1e0d1a" stroke="#c4547a" stroke-width="1.5"/>
      <polygon points="402,144 387,163 418,144" fill="#1e0d1a"/>
      <text x="445" y="107" text-anchor="middle" font-family="'Cormorant Garamond',Georgia,serif" font-size="16" font-style="italic" font-weight="400" fill="#c4547a">oh,</text>
      <text x="445" y="130" text-anchor="middle" font-family="'Cormorant Garamond',Georgia,serif" font-size="13" font-style="italic" fill="#d4b0c4">come here ♥</text>
    </g>

  </svg>

  <!-- Bottom banner -->
  <div class="mt-4 w-full max-w-xl">
    <div class="text-center py-3 px-4" style="background:#1e0d1a; border: 1px solid #3a1a30;">
      <p class="rainbow-text" id="rainbow">you know you want to</p>
      <p class="text-sm mt-2" style="font-family:'Cormorant Garamond',Georgia,serif; font-style:italic; color:#9b4a7c; letter-spacing:0.15em;">
        stay a little longer.
      </p>
    </div>
  </div>

  <script>
    // Slow colour drift on the tagline
    const colors = ['#c4547a','#9b4a7c','#d4849a','#e8a0b8','#c4547a'];
    const el = document.getElementById('rainbow');
    let offset = 0;
    setInterval(() => {
      const text = el.textContent;
      el.innerHTML = [...text].map((ch, i) =>
        ch === ' ' ? ' ' : `<span style="color:${colors[(i + offset) % colors.length]}">${ch}</span>`
      ).join('');
      offset++;
    }, 200);

    // Sparse falling whispers
    const stickers = [
      { text: 'stay', color: '#c4547a' },
      { text: '♥', color: '#d4849a' },
      { text: 'closer', color: '#9b4a7c' },
      { text: 'meow', color: '#c4547a' },
      { text: '✦', color: '#d4849a' },
      { text: 'don\'t go', color: '#9b4a7c' },
      { text: '♡', color: '#c4547a' },
      { text: 'gorgeous', color: '#d4849a' },
      { text: '~', color: '#9b4a7c' },
      { text: 'darling', color: '#c4547a' },
    ];

    const container = document.getElementById('stickers-container');

    function createSticker() {
      const s = stickers[Math.floor(Math.random() * stickers.length)];
      const div = document.createElement('div');
      div.className = 'sticker';
      div.textContent = s.text;
      const left = Math.random() * 95;
      const duration = 6 + Math.random() * 8;
      const delay = Math.random() * 2;
      div.style.left = left + 'vw';
      div.style.animationDuration = duration + 's';
      div.style.animationDelay = delay + 's';
      div.style.color = s.color;
      div.style.fontSize = (0.8 + Math.random() * 0.8) + 'rem';
      div.style.opacity = 0.6 + Math.random() * 0.4;
      container.appendChild(div);
      setTimeout(() => div.remove(), (duration + delay) * 1000 + 500);
    }

    setInterval(createSticker, 2500);
    for (let i = 0; i < 4; i++) setTimeout(createSticker, i * 600);
  </script>

</body>
</html>
