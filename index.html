<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VibeCadaver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #preview-frame { width: 100%; height: 100%; border: none; background: white; }
        @keyframes thinking-bounce {
            0%, 80%, 100% { opacity: 0.2; transform: translateY(0); }
            40% { opacity: 1; transform: translateY(-3px); }
        }
        .thinking-dot { animation: thinking-bounce 1.2s infinite ease-in-out; }
        .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dot:nth-child(3) { animation-delay: 0.4s; }
    </style>
</head>
<body class="h-screen bg-white overflow-hidden">

    <!-- Full-screen preview -->
    <iframe id="preview-frame" src="content.html" class="w-full h-full border-none block"></iframe>

    <!-- Floating contribute button -->
    <button onclick="toggleChat()" id="edit-btn"
        class="fixed bottom-6 left-6 px-5 py-2.5 bg-zinc-900 text-white text-sm font-bold tracking-widest rounded-full shadow-xl z-40 border border-zinc-700 opacity-40 hover:opacity-100 transition-opacity">
        CONTRIBUTE
    </button>

    <!-- Chat popup -->
    <div id="chat-popup" class="hidden fixed bottom-24 left-6 w-100 flex flex-col bg-zinc-950 border border-zinc-700 rounded-xl shadow-2xl z-50 overflow-hidden" style="height: 520px;">

        <div class="px-4 pt-4 pb-3 border-b border-zinc-800 flex items-center justify-between flex-shrink-0">
            <span id="remaining-count" class="text-zinc-400 text-sm" style="padding-right: 1rem;"></span>
            <div class="flex items-center gap-1">
                <button onclick="toggleHistory()" id="history-btn" title="History" class="text-zinc-400 hover:text-white transition-colors p-1 rounded hover:bg-zinc-800">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/>
                    </svg>
                </button>
                <button onclick="toggleAbout()" title="About" class="text-zinc-400 hover:text-white transition-colors p-1 rounded hover:bg-zinc-800">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
                    </svg>
                </button>
                <button onclick="toggleChat()" title="Close" class="text-zinc-400 hover:text-white transition-colors p-1 rounded hover:bg-zinc-800">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
        </div>

        <div id="chat-history" class="flex-1 p-4 overflow-y-auto space-y-4 text-sm text-white">
        </div>

        <div id="history-panel" class="hidden flex-1 overflow-y-auto flex-col text-sm text-white">
            <div id="history-list" class="divide-y divide-zinc-800"></div>
        </div>

        <div id="chat-footer" class="p-4 border-t border-zinc-800 flex-shrink-0">
            <textarea id="vibe-input" placeholder="What will you change?"
                class="w-full bg-zinc-900 border border-zinc-700 rounded p-2 focus:outline-none focus:border-blue-500 h-20 resize-none text-sm text-white"></textarea>
            <button onclick="sendVibe()" id="send-btn" class="w-full mt-2 py-2 bg-white text-black font-bold rounded hover:bg-zinc-200 transition text-sm">Change</button>
            <button onclick="publishToGithub()" id="publish-btn" class="hidden w-full mt-2 py-2 bg-blue-600 font-bold rounded hover:bg-blue-500 transition text-sm text-white">Publish</button>
        </div>
    </div>

    <!-- [own-key] settings modal removed; restore with toggleSettings() if re-enabling own key -->
    <!-- [own-key] <div id="settings-modal" ...> ... </div> -->

    <!-- About modal -->
    <div id="about-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
        <div class="bg-zinc-900 p-6 rounded-lg w-full max-w-md border border-zinc-700">
            <div class="flex items-center justify-between mb-5">
                <h2 class="text-xl font-bold text-white tracking-tight">How it works</h2>
                <button onclick="toggleAbout()" class="text-zinc-400 hover:text-white transition-colors p-1 rounded hover:bg-zinc-800">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="space-y-4 text-sm text-zinc-300 leading-relaxed">
                <p>This page is a shared canvas. Anyone can leave their mark on it.</p>
                <p>Type what you want to change. One thing at a time. If you like the result, publish it and the live page updates for everyone.</p>
                <p id="about-limit" class="text-zinc-500"></p>
            </div>
        </div>
    </div>

    <script>
        let currentCode = "";
        let lastPrompt = "";
        let hasUnpublishedChanges = false;

        const DAILY_LIMIT = 3;

        function getUsageToday() {
            const today = new Date().toISOString().slice(0, 10);
            const stored = JSON.parse(localStorage.getItem('usage_today') || '{}');
            return stored.date === today ? (stored.used || 0) : 0;
        }

        function incrementUsageToday() {
            const today = new Date().toISOString().slice(0, 10);
            localStorage.setItem('usage_today', JSON.stringify({ date: today, used: getUsageToday() + 1 }));
        }

        function updateRemainingDisplay() {
            const remaining = DAILY_LIMIT - getUsageToday();
            const el = document.getElementById('remaining-count');
            if (remaining <= 0) {
                el.textContent = 'No contributions remaining today';
                el.className = 'text-red-400 text-sm';
            } else {
                el.textContent = `${remaining} contribution${remaining === 1 ? '' : 's'} remaining today`;
                el.className = 'text-zinc-400 text-sm';
            }
        }

        function toggleChat() {
            const popup = document.getElementById('chat-popup');
            const isHidden = popup.classList.toggle('hidden');
            if (!isHidden) updateRemainingDisplay();
        }

        function navigateHome() {
            if (hasUnpublishedChanges && !confirm("You have unpublished changes that will be lost. Leave anyway?")) return;
            window.location.href = "content.html";
        }

        window.addEventListener('beforeunload', e => {
            if (hasUnpublishedChanges) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        // Seed currentCode with content.html so Claude has context from the first message
        fetch('content.html')
            .then(r => r.text())
            .then(html => { currentCode = html; })
            .catch(() => {});

        // UI Logic
        let historyOpen = false;

        function timeAgo(dateStr) {
            const seconds = Math.floor((Date.now() - new Date(dateStr)) / 1000);
            if (seconds < 60) return 'just now';
            const intervals = [[31536000,'y'],[2592000,'mo'],[86400,'d'],[3600,'h'],[60,'m']];
            for (const [s, label] of intervals) {
                const n = Math.floor(seconds / s);
                if (n >= 1) return `${n}${label} ago`;
            }
        }

        async function toggleHistory() {
            historyOpen = !historyOpen;
            const panel = document.getElementById('history-panel');
            const chat = document.getElementById('chat-history');
            const footer = document.getElementById('chat-footer');
            const btn = document.getElementById('history-btn');

            if (historyOpen) {
                chat.classList.add('hidden');
                footer.classList.add('hidden');
                panel.classList.remove('hidden');
                panel.classList.add('flex');
                btn.classList.add('text-white');
                btn.classList.remove('text-zinc-400');
                loadHistory();
            } else {
                panel.classList.add('hidden');
                panel.classList.remove('flex');
                chat.classList.remove('hidden');
                footer.classList.remove('hidden');
                btn.classList.remove('text-white');
                btn.classList.add('text-zinc-400');
            }
        }

        async function loadHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = '<div class="p-4 text-zinc-500 text-sm">Loading...</div>';
            try {
                const commits = await githubAPI('/repos/slvtrs/ouroboros/commits?path=content.html&per_page=30', 'GET');
                if (!Array.isArray(commits) || commits.length === 0) {
                    list.innerHTML = '<div class="p-4 text-zinc-500 text-sm">No history found.</div>';
                    return;
                }
                list.innerHTML = '';
                commits.forEach((commit, i) => {
                    const sha = commit.sha;
                    const message = commit.commit.message || 'no message';
                    const date = commit.commit.author.date;
                    const div = document.createElement('div');
                    div.className = 'px-4 py-3 hover:bg-zinc-800 cursor-pointer transition-colors';
                    div.innerHTML = `
                        <div class="text-white text-sm leading-snug">${message.slice(0, 60)}${message.length > 60 ? '…' : ''}</div>
                        <div class="text-zinc-500 text-xs mt-0.5">${timeAgo(date)}${i === 0 ? ' · current' : ''}</div>
                    `;
                    div.onclick = () => previewCommit(sha, message, div);
                    list.appendChild(div);
                });
            } catch (err) {
                list.innerHTML = `<div class="p-4 text-red-400 text-sm">${err.message}</div>`;
            }
        }

        async function previewCommit(sha, message, el) {
            // Highlight selected
            document.querySelectorAll('#history-list > div').forEach(d => d.classList.remove('bg-zinc-800'));
            el.classList.add('bg-zinc-800');

            try {
                const file = await githubAPI(`/repos/slvtrs/ouroboros/contents/content.html?ref=${sha}`, 'GET');
                const html = atob(file.content.replace(/\n/g, ''));
                currentCode = html;
                document.getElementById('preview-frame').srcdoc = html;
                hasUnpublishedChanges = true;
                document.getElementById('publish-btn').classList.remove('hidden');
                // Switch back to chat view so publish button is visible
                historyOpen = true;
                toggleHistory();
                addChatMessage('claude', `Previewing: "${message.slice(0, 50)}" — publish to restore it.`);
            } catch (err) {
                addChatMessage('error', 'Could not load that version.');
            }
        }

        function toggleAbout() {
            document.getElementById('about-modal').classList.toggle('hidden');
            document.getElementById('about-limit').textContent = `${DAILY_LIMIT} contributions per day.`;
        }
        function toggleSettings() { document.getElementById('settings-modal').classList.toggle('hidden'); }
        const WORKER_URL = "https://ouroboros-worker.soroboruo.workers.dev/"
        // "https://soroboruo.workers.dev/"

        // [own-key] function saveSettings() {
        //     const key = document.getElementById('claude-key').value.trim();
        //     if (key) localStorage.setItem('vibe_claude_key', key);
        //     else localStorage.removeItem('vibe_claude_key');
        //     toggleSettings();
        // }

        document.getElementById('vibe-input').addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey && !e.altKey) {
                e.preventDefault();
                sendVibe();
            }
        });

        function addChatMessage(role, text) {
            const div = document.createElement('div');
            div.className = role === 'user' ? 'text-blue-400' : role === 'error' ? 'text-red-400' : 'text-zinc-300';
            div.innerHTML = `<strong>${role === 'error' ? 'ERROR' : role.toUpperCase()}:</strong> ${text}`;
            document.getElementById('chat-history').appendChild(div);
            document.getElementById('chat-history').scrollTop = document.getElementById('chat-history').scrollHeight;
        }

        function showThinking() {
            const div = document.createElement('div');
            div.id = 'thinking-indicator';
            div.className = 'text-zinc-400 text-sm flex items-center gap-2';
            div.innerHTML = `<strong>CLAUDE:</strong> <span class="flex gap-1">
                <span class="thinking-dot w-1.5 h-1.5 rounded-full bg-zinc-400 inline-block"></span>
                <span class="thinking-dot w-1.5 h-1.5 rounded-full bg-zinc-400 inline-block"></span>
                <span class="thinking-dot w-1.5 h-1.5 rounded-full bg-zinc-400 inline-block"></span>
            </span>`;
            document.getElementById('chat-history').appendChild(div);
            document.getElementById('chat-history').scrollTop = document.getElementById('chat-history').scrollHeight;
        }

        function hideThinking() {
            const el = document.getElementById('thinking-indicator');
            if (el) el.remove();
        }

        function playChime() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const frequencies = [880, 1108.73]; // A5 → C#6
            frequencies.forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.value = freq;
                const start = ctx.currentTime + i * 0.12;
                gain.gain.setValueAtTime(0, start);
                gain.gain.linearRampToValueAtTime(0.18, start + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.6);
                osc.start(start);
                osc.stop(start + 0.6);
            });
        }

        // The "Vibe" Logic
        async function sendVibe() {
            const input = document.getElementById('vibe-input');
            const btn = document.getElementById('send-btn');
            const prompt = input.value;
            if (!prompt) return;

            lastPrompt = prompt;
            input.value = "";
            btn.disabled = true;
            btn.innerText = "thinking...";
            addChatMessage('user', prompt);
            showThinking();

            // [own-key] const userKey = localStorage.getItem('vibe_claude_key');

            try {
                const reqHeaders = {
                    "content-type": "application/json",
                };
                // [own-key] if (userKey) reqHeaders["X-Api-Key"] = userKey;

                const response = await fetch(`${WORKER_URL}/api/transmute`, {
                    method: "POST",
                    headers: reqHeaders,
                    body: JSON.stringify({
                        model: "claude-sonnet-4-6",
                        max_tokens: 8000,
                        system: `You are a collaborative editor for a shared living webpage. Many different people leave their mark on it over time — each person makes one contribution.

Your job is to fulfill the user's request as a single, coherent patch. A contribution can range from tiny (change one color) to meaningful (convert to dark mode, change the layout) — but it must be ONE unified idea, applied as one patch.

Rules:
- One patch per response. If the request contains multiple unrelated ideas, pick the most interesting one.
- Never return full HTML. Never rewrite the whole page from scratch.
- A patch can touch many lines if they all serve the same idea (e.g. dark mode requires changing multiple colors — that's fine as one patch).
- Respond ONLY with exactly one patch in this format — no other text, no markdown fences:

<<<FIND>>>
exact text from the current page to replace (must match exactly, including whitespace)
<<<REPLACE>>>
new text to put in its place
<<<END>>>`,
                        messages: [{ role: "user", content: currentCode ? `Current page:\n${currentCode}\n\nTask: ${prompt}` : `Task: ${prompt}` }]
                    })
                });

                const data = await response.json();
                if (response.status === 429) {
                    hideThinking();
                    addChatMessage('error', data.error);
                    updateRemainingDisplay();
                    btn.disabled = false;
                    btn.innerText = "Change";
                    return;
                }
                const rawText = data.content[0].text.trim();

                console.log('%c[ouroboros] raw response:', 'color: #a78bfa; font-weight: bold');
                console.log(rawText);

                if (data.stop_reason === 'max_tokens') {
                    addChatMessage('error', "Response was cut off (hit token limit) — the preview may be incomplete.");
                }

                // Full HTML rewrites are not allowed — patch only
                if (!rawText.includes('<<<FIND>>>')) {
                    hideThinking();
                    addChatMessage('error', "That change was too large. Try something more focused — one idea at a time.");
                    return;
                }

                const patches = [...rawText.matchAll(/<<<FIND>>>([\s\S]*?)<<<REPLACE>>>([\s\S]*?)<<<END>>>/g)];

                if (patches.length > 1) {
                    hideThinking();
                    addChatMessage('error', "Only one change at a time. Try being more specific.");
                    return;
                }

                const [, find, replace] = patches[0];
                const findText = find.trim();
                const replaceText = replace.trim();

                if (!currentCode.includes(findText)) {
                    hideThinking();
                    addChatMessage('error', "Couldn't apply the change — try rephrasing your request.");
                    console.warn('[ouroboros] patch FIND text not found:', findText);
                    return;
                }

                const newCode = currentCode.replace(findText, replaceText);

                currentCode = newCode;
                document.getElementById('preview-frame').srcdoc = currentCode;
                hasUnpublishedChanges = true;
                document.getElementById('publish-btn').classList.remove('hidden');
                incrementUsageToday();
                updateRemainingDisplay();
                hideThinking();
                playChime();
                addChatMessage('claude', "Done — publish to make it live.");
            } catch (err) {
                hideThinking();
                addChatMessage('error', err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Send";
            }
        }

        // The GitHub Logic
        // Patterns that should never appear in AI-generated content.html
        const BLOCKED_PATTERNS = [
            { re: /WORKER_URL/i,             reason: "references Worker URL" },
            { re: /GITHUB_PAT/i,             reason: "references GitHub PAT" },
            { re: /ANTHROPIC_KEY/i,          reason: "references Anthropic key" },
            { re: /vibe_claude_key/i,        reason: "references localStorage key name" },
            { re: /vibe_gh_token/i,          reason: "references localStorage key name" },
            { re: /workers\.dev/i,           reason: "references Worker domain" },
            { re: /api\.anthropic\.com/i,    reason: "direct Anthropic API call" },
            { re: /api\.github\.com/i,       reason: "direct GitHub API call" },
            { re: /localStorage\s*\.\s*getItem\s*\(\s*['"]vibe_/i, reason: "accesses app secrets from localStorage" },
        ];

        function sanitizeForPublish(html) {
            for (const { re, reason } of BLOCKED_PATTERNS) {
                if (re.test(html)) {
                    return { ok: false, reason };
                }
            }
            if (!html.includes("<") || html.trim().length < 10) {
                return { ok: false, reason: "doesn't look like valid HTML" };
            }
            return { ok: true };
        }

        async function githubAPI(path, method, body) {
            const res = await fetch(`${WORKER_URL}/api/publish`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ path, method, body }),
            });
            return res.json();
        }

        async function publishToGithub() {
            const btn = document.getElementById('publish-btn');
            if (!currentCode) return alert("Nothing to publish yet!");

            const check = sanitizeForPublish(currentCode);
            if (!check.ok) {
                addChatMessage('error', `Publish blocked: generated content ${check.reason}. Try regenerating.`);
                return;
            }

            btn.innerText = "Publishing...";
            try {
                const fileData = await githubAPI("/repos/slvtrs/ouroboros/contents/content.html", "GET");
                await githubAPI("/repos/slvtrs/ouroboros/contents/content.html", "PUT", {
                    message: lastPrompt ? lastPrompt.slice(0, 72) : "Vibe update",
                    content: btoa(unescape(encodeURIComponent(currentCode))),
                    sha: fileData.sha,
                });
                hasUnpublishedChanges = false;
                document.getElementById('publish-btn').classList.add('hidden');
                alert("Published! It may take 1 minute to refresh on your live URL.");
            } catch (err) {
                alert("GitHub Error: " + err.message);
            } finally {
                btn.innerText = "Publish to GitHub";
            }
        }

        // Revert last commit
        async function revertLastCommit() {
            const btn = document.getElementById('revert-btn');
            if (!confirm("This will revert content.html to the previous commit and push it. Continue?")) return;

            btn.innerText = "Reverting...";
            btn.disabled = true;
            try {
                const commits = await githubAPI("/repos/slvtrs/ouroboros/commits?path=content.html&per_page=2", "GET");
                if (!commits[1]) return alert("No previous commit to revert to.");

                const prevSha = commits[1].sha;
                const prevMessage = commits[1].commit.message;

                const prevFile = await githubAPI(`/repos/slvtrs/ouroboros/contents/content.html?ref=${prevSha}`, "GET");
                const currFile = await githubAPI("/repos/slvtrs/ouroboros/contents/content.html", "GET");

                await githubAPI("/repos/slvtrs/ouroboros/contents/content.html", "PUT", {
                    message: `Revert to: ${prevMessage}`,
                    content: prevFile.content.replace(/\n/g, ''),
                    sha: currFile.sha,
                });

                const reverted = atob(prevFile.content.replace(/\n/g, ''));
                currentCode = reverted;
                document.getElementById('preview-frame').srcdoc = reverted;
                hasUnpublishedChanges = false;
                document.getElementById('publish-btn').classList.add('hidden');
                addChatMessage('claude', `Reverted to: "${prevMessage}"`);
            } catch (err) {
                alert("Revert failed: " + err.message);
            } finally {
                btn.innerText = "Revert";
                btn.disabled = false;
            }
        }

    </script>
</body>
</html>
